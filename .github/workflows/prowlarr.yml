name: Prowlarr

on:
  push:
    branches:
      - main
    paths:
      - 'prowlarr/**'
      - .github/workflows/prowlarr.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hardened Images
        uses: docker/login-action@v4
        with:
          registry: dhi.io
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configure WarpBuild Docker Builders
        uses: Warpbuilds/docker-configure@v1
        with:
          profile-name: warp-docker
          api-key: ${{ secrets.WARPBUILD_API_KEY }}

      - name: Build and push image (latest, sha)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./prowlarr
          push: true
          sbom: true
          tags: |
            ghcr.io/${{ github.repository }}/prowlarr:latest
            ghcr.io/${{ github.repository }}/prowlarr:${{ github.sha }}
          platforms: linux/amd64
          outputs: type=registry,oci-mediatypes=true,compression=zstd,force-compression=false

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/prowlarr
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
